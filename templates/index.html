<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SGOLD VAULT | SHAKE TO EARN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
    <style>
        body { 
            background: #000205; color: #fff; font-family: 'Orbitron', sans-serif; 
            overflow: hidden !important; height: 100vh; width: 100vw;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            position: fixed; touch-action: none;
        }
        .robot-glow { filter: drop-shadow(0 0 20px #FFD700); width: 180px; transition: 0.3s; cursor: pointer; }
        .gold-active { filter: sepia(1) saturate(10) brightness(1.2) drop-shadow(0 0 30px #FFD700) !important; }
        .shake-anim { animation: shake 0.1s infinite; }
        @keyframes shake { 0% { transform: translate(2px, 2px); } 50% { transform: translate(-2px, -2px); } 100% { transform: translate(2px, -2px); } }
        
        #status-badge { 
            border: 1px solid #00F0FF; padding: 10px 20px; border-radius: 50px; 
            color: #00F0FF; font-size: 11px; margin-bottom: 20px; 
            text-transform: uppercase; text-align: center; min-width: 280px;
        }
        
        #balance-container { 
            display: none; margin-top: 20px; border: 1px solid rgba(255, 215, 0, 0.3); 
            padding: 10px 30px; border-radius: 15px; background: rgba(255, 215, 0, 0.05); 
            transition: all 0.5s ease;
        }
        
        .counter-up { transition: all 0.5s ease; }
    </style>
</head>
<body>

    <div id="status-badge" class="animate-pulse">▲ CONNECT PHANTOM TO START ▲</div>

    <img src="https://static.wixstatic.com/media/ec4b8d_846472666283449eaf02d0dcd16e78d7~mv2.jpg" id="robot" class="robot-glow">

    <div id="balance-container">
        <span class="text-gray-400 text-[10px] uppercase block tracking-widest text-center">Your Balance</span>
        <div class="text-gold text-2xl font-black text-center">
            <span id="amount" class="counter-up">0</span> $SGOLD
        </div>
    </div>

    <h1 class="text-xl mt-8 text-center opacity-50 uppercase tracking-[0.3em]">Vault Access</h1>

    <script>
        let wallet = null;
        let isShaking = false;
        let lastX = null, lastY = null;
        
        const robot = document.getElementById('robot');
        const status = document.getElementById('status-badge');
        const balanceContainer = document.getElementById('balance-container');
        const amountDisplay = document.getElementById('amount');

        // FONCTION DE COMPTEUR ANIMÉ (Jackpot Effect)
        function animateCounter(start, end, duration) {
            let startTimestamp = null;
            const step = (timestamp) => {
                if (!startTimestamp) startTimestamp = timestamp;
                const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                const currentVal = Math.floor(progress * (end - start) + start);
                amountDisplay.innerText = currentVal.toLocaleString();
                if (progress < 1) {
                    window.requestAnimationFrame(step);
                }
            };
            window.requestAnimationFrame(step);
        }

        robot.onclick = async () => {
            if (!wallet) {
                const provider = window.solana || (window.parent && window.parent.solana);
                if (provider) {
                    try {
                        const resp = await provider.connect();
                        wallet = resp.publicKey.toString();
                        updateUI(); 
                        status.innerText = "WALLET LINKED! CLICK TO ACTIVATE SENSORS";
                        status.style.borderColor = "#FFD700"; status.style.color = "#FFD700";
                    } catch(e) { status.innerText = "DENIED"; }
                } else { alert("Open in Phantom Browser!"); }
            } else {
                if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
                    DeviceMotionEvent.requestPermission().then(state => {
                        if (state === 'granted') startMining();
                    }).catch(e => alert("Please allow sensors"));
                } else {
                    startMining();
                }
            }
        };

        function startMining() {
            window.addEventListener('devicemotion', (e) => {
                if (isShaking) return;
                let acc = e.accelerationIncludingGravity;
                if (!acc) return;
                let delta = Math.abs(acc.x - (lastX || acc.x)) + Math.abs(acc.y - (lastY || acc.y));
                if (delta > 15) earn(); 
                lastX = acc.x; lastY = acc.y;
            }, true);
            status.innerText = "SENSORS LIVE! SHAKE IT! 🛡️";
            balanceContainer.style.display = "block";
        }

        async function updateUI() {
            try {
                const res = await fetch('/api/shake-earn', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ walletAddress: wallet, checkOnly: true })
                });
                const data = await res.json();
                if (data.total_earned !== undefined) {
                    amountDisplay.innerText = data.total_earned.toLocaleString();
                    balanceContainer.style.display = "block";
                }
            } catch (e) { console.error("Update error"); }
        }

        async function earn() {
            if (isShaking) return;
            isShaking = true;
            robot.classList.add('shake-anim', 'gold-active');
            status.innerText = "⚡ EXTRACTING GOLD...";
            
            try {
                const res = await fetch('/api/shake-earn', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ walletAddress: wallet })
                });
                const data = await res.json();

                if (data.success) {
                    confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
                    status.innerText = "SUCCESS! +500 $SGOLD";

                    // DÉCLENCHEMENT DU COMPTEUR ANIMÉ
                    const oldVal = parseInt(amountDisplay.innerText.replace(/,/g, '')) || 0;
                    const newVal = data.total_earned;
                    animateCounter(oldVal, newVal, 1500); // 1.5 seconde d'animation
                    
                } else {
                    status.innerText = data.message;
                    if (data.total_earned !== undefined) {
                        amountDisplay.innerText = data.total_earned.toLocaleString();
                    }
                }
            } catch (e) { status.innerText = "CONNECTION ERROR"; }

            setTimeout(() => { 
                isShaking = false; 
                robot.classList.remove('shake-anim', 'gold-active'); 
                if(!status.innerText.includes("SUCCESS")) status.innerText = "SHAKE IT!";
            }, 3000);
        }
    </script>
</body>
</html>
