<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SGOLD VAULT | SHAKE TO EARN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
    <style>
        /* Optimisation pour plein écran mobile sans scroll */
        body { 
            background: #000205; 
            color: #fff; 
            font-family: 'Orbitron', sans-serif; 
            margin: 0;
            padding: 0;
            height: 100vh; 
            height: 100svh; 
            width: 100vw;
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: space-between; 
            padding: env(safe-area-inset-top) 20px env(safe-area-inset-bottom) 20px;
            position: fixed; 
            touch-action: none;
            overflow: hidden !important;
        }

        /* Robot avec animations de la main page */
        .robot-glow { 
            width: min(250px, 60vw); 
            transition: 0.3s; 
            cursor: pointer; 
            margin: auto 0;
            border-radius: 50%;
            border: 3px solid #FFD700;
            overflow: hidden;
            background: #000;
            /* Animations combinées : Flotter + Pulsation dorée */
            animation: float 6s ease-in-out infinite, pulseGlow 2s infinite;
        }

        /* État quand on secoue (Shake) */
        .gold-active { 
            filter: sepia(1) saturate(10) brightness(1.2) drop-shadow(0 0 40px #FFD700) !important; 
            animation: shake 0.1s infinite !important;
        }
        
        /* Keyframes Main Page */
        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(2deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }

        @keyframes pulseGlow {
            0%, 100% { box-shadow: 0 0 15px rgba(255, 215, 0, 0.3); transform: scale(1); }
            50% { box-shadow: 0 0 35px rgba(255, 215, 0, 0.6); transform: scale(1.02); }
        }

        @keyframes shake { 
            0% { transform: translate(3px, 3px); } 
            50% { transform: translate(-3px, -3px); } 
            100% { transform: translate(3px, -3px); } 
        }
        
        #status-badge { 
            border: 1px solid #00F0FF; 
            padding: 12px 24px; 
            border-radius: 50px; 
            color: #00F0FF; 
            font-size: 11px; 
            margin-top: 20px;
            text-transform: uppercase; 
            text-align: center; 
            min-width: 280px;
            background: rgba(0, 240, 255, 0.05);
        }
        
        #balance-container { 
            display: none; 
            margin-bottom: 30px; 
            border: 1px solid rgba(255, 215, 0, 0.3); 
            padding: 15px 40px; 
            border-radius: 20px; 
            background: rgba(255, 215, 0, 0.1); 
            width: 100%;
            max-width: 320px;
        }
    </style>
</head>
<body>

    <div id="status-badge" class="animate-pulse">▲ CONNECT PHANTOM TO START ▲</div>

    <img src="https://static.wixstatic.com/media/ec4b8d_846472666283449eaf02d0dcd16e78d7~mv2.jpg" id="robot" class="robot-glow">

    <div id="balance-container">
        <span class="text-gray-400 text-[10px] uppercase block tracking-widest text-center">Your Balance</span>
        <div class="text-gold text-3xl font-black text-center">
            <span id="amount">0</span> $SGOLD
        </div>
    </div>

    <script>
        let wallet = null;
        let isShaking = false;
        let lastX = null, lastY = null;
        
        const robot = document.getElementById('robot');
        const status = document.getElementById('status-badge');
        const balanceContainer = document.getElementById('balance-container');
        const amountDisplay = document.getElementById('amount');

        function animateCounter(start, end, duration) {
            let startTimestamp = null;
            const step = (timestamp) => {
                if (!startTimestamp) startTimestamp = timestamp;
                const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                const currentVal = Math.floor(progress * (end - start) + start);
                amountDisplay.innerText = currentVal.toLocaleString();
                if (progress < 1) window.requestAnimationFrame(step);
            };
            window.requestAnimationFrame(step);
        }

        robot.onclick = async () => {
            if (!wallet) {
                const provider = window.solana || (window.parent && window.parent.solana);
                if (provider) {
                    try {
                        const resp = await provider.connect();
                        wallet = resp.publicKey.toString();
                        updateUI(); 
                        status.innerText = "CONNECTED! TAP ROBOT TO ACTIVATE SENSORS";
                        status.style.borderColor = "#FFD700"; status.style.color = "#FFD700";
                    } catch(e) { status.innerText = "CONNECTION DENIED"; }
                } else { alert("Please open inside Phantom Browser!"); }
            } else {
                if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
                    DeviceMotionEvent.requestPermission().then(state => {
                        if (state === 'granted') startMining();
                    }).catch(e => alert("Please allow motion sensors"));
                } else {
                    startMining();
                }
            }
        };

        function startMining() {
            window.addEventListener('devicemotion', (e) => {
                if (isShaking) return;
                let acc = e.accelerationIncludingGravity;
                if (!acc) return;
                let delta = Math.abs(acc.x - (lastX || acc.x)) + Math.abs(acc.y - (lastY || acc.y));
                if (delta > 15) earn(); 
                lastX = acc.x; lastY = acc.y;
            }, true);
            status.innerText = "SENSORS LIVE! SHAKE YOUR PHONE! 🛡️";
            balanceContainer.style.display = "block";
        }

        async function updateUI() {
            try {
                const res = await fetch('/api/shake-earn', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ walletAddress: wallet, checkOnly: true })
                });
                const data = await res.json();
                if (data.total_earned !== undefined) {
                    amountDisplay.innerText = data.total_earned.toLocaleString();
                    balanceContainer.style.display = "block";
                }
            } catch (e) { console.error("Update error"); }
        }

        async function earn() {
            if (isShaking) return;
            isShaking = true;
            robot.classList.add('gold-active');
            status.innerText = "⚡ EXTRACTING GOLD...";
            
            try {
                const res = await fetch('/api/shake-earn', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ walletAddress: wallet })
                });
                const data = await res.json();

                if (data.success) {
                    confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
                    status.innerText = "SUCCESS! +500 $SGOLD";
                    const oldVal = parseInt(amountDisplay.innerText.replace(/,/g, '')) || 0;
                    animateCounter(oldVal, data.total_earned, 1500);
                } else {
                    status.innerText = data.message;
                    if (data.total_earned !== undefined) {
                        amountDisplay.innerText = data.total_earned.toLocaleString();
                    }
                }
            } catch (e) { status.innerText = "DATABASE ERROR"; }

            setTimeout(() => { 
                isShaking = false; 
                robot.classList.remove('gold-active'); 
                if(!status.innerText.includes("SUCCESS")) status.innerText = "READY! SHAKE AGAIN";
            }, 3000);
        }
    </script>
</body>
</html>
