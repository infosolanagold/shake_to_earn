<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SGOLD VAULT | SHAKE TO EARN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
    <style>
        body { background: #000205; color: #fff; font-family: 'Orbitron', sans-serif; overflow: hidden; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .robot-glow { filter: drop-shadow(0 0 20px #FFD700); width: 180px; transition: 0.3s; cursor: pointer; }
        .gold-active { filter: sepia(1) saturate(10) brightness(1.2) drop-shadow(0 0 30px #FFD700) !important; }
        .shake-anim { animation: shake 0.1s infinite; }
        @keyframes shake { 0% { transform: translate(2px, 2px); } 50% { transform: translate(-2px, -2px); } 100% { transform: translate(2px, -2px); } }
        #status-badge { border: 1px solid #00F0FF; padding: 10px 20px; border-radius: 50px; color: #00F0FF; font-size: 12px; margin-bottom: 20px; text-transform: uppercase; text-align: center; }
    </style>
</head>
<body>

    <div id="status-badge" class="animate-pulse">▲ CONNECT PHANTOM TO START ▲</div>

    <img src="https://static.wixstatic.com/media/ec4b8d_846472666283449eaf02d0dcd16e78d7~mv2.jpg" id="robot" class="robot-glow">

    <div id="balance" class="hidden text-gold mt-4 text-xl font-bold">
        TOTAL: <span id="amount">0</span> $SGOLD
    </div>

    <h1 class="text-2xl mt-6 text-center">SOLANA GOLD<br><span class="text-gold">VAULT ACCESS</span></h1>

    <script>
        let wallet = null;
        let isShaking = false;
        let lastX = null, lastY = null;
        
        // URL DE TON API RENDER
        const API_URL = "https://shake-to-earn.onrender.com/api/shake-earn";

        const robot = document.getElementById('robot');
        const status = document.getElementById('status-badge');
        const balanceDiv = document.getElementById('balance');
        const amountSpan = document.getElementById('amount');

        robot.onclick = async () => {
            if (!wallet) {
                if (window.solana) {
                    try {
                        const resp = await window.solana.connect();
                        wallet = resp.publicKey.toString();
                        
                        // Récupérer le solde immédiatement après connexion
                        fetchBalance();

                        status.innerText = "WALLET LINKED! CLICK TO ACTIVATE SENSORS";
                        status.style.borderColor = "#FFD700"; 
                        status.style.color = "#FFD700";
                    } catch(e) { status.innerText = "CONNECTION DENIED"; }
                } else { alert("Open this in Phantom Browser!"); }
            } 
            else {
                if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
                    DeviceMotionEvent.requestPermission().then(state => {
                        if (state === 'granted') {
                            startMotionListener();
                        }
                    }).catch(e => alert("Please allow sensor access in settings"));
                } else {
                    startMotionListener();
                }
            }
        };

        function startMotionListener() {
            window.addEventListener('devicemotion', (e) => {
                if (isShaking) return;
                let acc = e.accelerationIncludingGravity;
                if (!acc) return;

                let change = 0;
                if (lastX !== null) {
                    change = Math.abs(acc.x - lastX) + Math.abs(acc.y - lastY);
                }

                if (change > 15) { 
                    earn();
                }

                lastX = acc.x; lastY = acc.y;
            }, true);
            status.innerText = "SENSORS LIVE! SHAKE YOUR PHONE!";
            balanceDiv.classList.remove('hidden');
        }

        async function fetchBalance() {
            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ walletAddress: wallet, checkOnly: true })
                });
                const data = await res.json();
                if (data.total_earned !== undefined) {
                    amountSpan.innerText = data.total_earned;
                    balanceDiv.classList.remove('hidden');
                }
            } catch (e) { console.log("Balance fetch error", e); }
        }

        async function earn() {
            if (isShaking) return;
            isShaking = true;
            
            robot.classList.add('shake-anim', 'gold-active');
            status.innerText = "⚡ EXTRACTING GOLD...";
            
            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ walletAddress: wallet })
                });
                const data = await res.json();
                console.log("Server response:", data);

                // MISE À JOUR SYSTÉMATIQUE DU SOLDE
                if (data.total_earned !== undefined) {
                    amountSpan.innerText = data.total_earned;
                    balanceDiv.classList.remove('hidden');
                }

                if (data.success) {
                    confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
                    status.innerText = "SUCCESS! +500 $SGOLD";
                } else {
                    status.innerText = data.message || "ALREADY CLAIMED TODAY";
                }
            } catch (e) { 
                status.innerText = "SERVER ERROR"; 
                console.error("Earn error:", e);
            }

            setTimeout(() => { 
                isShaking = false; 
                robot.classList.remove('shake-anim', 'gold-active'); 
                if(!status.innerText.includes("SUCCESS")) {
                    status.innerText = "SENSORS LIVE! SHAKE IT!"; 
                }
            }, 3000);
        }
    </script>
</body>
</html>
