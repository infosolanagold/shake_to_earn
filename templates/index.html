<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SGOLD - Shake</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body { background: #000; color: #FFD700; text-align: center; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .robot { width: 150px; margin-bottom: 20px; transition: 0.3s; }
        .btn { background: #FFD700; color: #000; border: none; padding: 15px 30px; border-radius: 50px; font-weight: bold; font-size: 1.2rem; cursor: pointer; }
        #status { margin-top: 20px; color: #888; font-size: 14px; }
        .shaking { animation: shake 0.2s infinite; }
        @keyframes shake { 0% { transform: translate(0,0); } 25% { transform: translate(5px,5px); } 50% { transform: translate(-5px,-5px); } 75% { transform: translate(5px,-5px); } }
    </style>
</head>
<body>

    <img src="https://static.wixstatic.com/media/ec4b8d_846472666283449eaf02d0dcd16e78d7~mv2.jpg" id="robot" class="robot">
    <button id="mainBtn" class="btn">CONNECT WALLET</button>
    <div id="status">Open in Phantom App Browser</div>

    <script>
        let wallet = null;
        let lastX = null;
        const mainBtn = document.getElementById('mainBtn');
        const status = document.getElementById('status');
        const robot = document.getElementById('robot');

        // FONCTION DE CONNEXION SIMPLIFIÉE
        mainBtn.onclick = async () => {
            if (!wallet) {
                // On vérifie si on est dans Phantom
                const isPhantom = window.solana && window.solana.isPhantom;
                
                if (isPhantom) {
                    try {
                        status.innerText = "Connecting...";
                        const resp = await window.solana.connect();
                        wallet = resp.publicKey.toString();
                        status.innerText = "Wallet: " + wallet.slice(0,6) + "...";
                        mainBtn.innerText = "START SENSORS";
                    } catch (err) {
                        status.innerText = "Connection rejected";
                    }
                } else {
                    alert("Please open this page INSIDE the Phantom App browser tab.");
                }
            } else {
                // Demande de capteurs
                askSensors();
            }
        };

        function askSensors() {
            if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
                DeviceMotionEvent.requestPermission()
                    .then(state => {
                        if (state === 'granted') {
                            window.addEventListener('devicemotion', onMotion);
                            mainBtn.style.display = 'none';
                            status.innerText = "SENSORS ACTIVE! SHAKE IT!";
                        }
                    })
                    .catch(e => alert("Please allow motion access"));
            } else {
                window.addEventListener('devicemotion', onMotion);
                mainBtn.style.display = 'none';
                status.innerText = "SHAKE IT!";
            }
        }

        function onMotion(e) {
            let acc = e.accelerationIncludingGravity;
            if (!acc) return;
            let currentX = acc.x;
            if (lastX !== null && Math.abs(currentX - lastX) > 15) {
                triggerShake();
            }
            lastX = currentX;
        }

        async function triggerShake() {
            window.removeEventListener('devicemotion', onMotion);
            robot.classList.add('shaking');
            status.innerText = "GOLD EXTRACTED!";
            
            try {
                const res = await fetch('https://shake-to-earn.onrender.com/api/shake-earn', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ walletAddress: wallet })
                });
                const data = await res.json();
                if (data.success) {
                    confetti();
                    status.innerText = "SUCCESS! +" + data.amount + " $SGOLD";
                }
            } catch (e) {
                status.innerText = "Success (Server update pending)";
            }

            setTimeout(() => {
                robot.classList.remove('shaking');
                window.addEventListener('devicemotion', onMotion);
            }, 3000);
        }
    </script>
</body>
</html>
